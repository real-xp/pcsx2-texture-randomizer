name: Build Binary

on:
  push:
    branches: ["development"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --name "PCSX2 Texture Randomizer" --clean --specpath "./build" --distpath "./app" --workpath "./build" --onefile bin/main.py

      - name: Upload artifact (Linux)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: pcsx2-texture-randomizer-${{ matrix.os }}
          path: dist/pcsx2-texture-randomizer
          retention-days: 1

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: pcsx2-texture-randomizer-${{ matrix.os }}
          path: dist/pcsx2-texture-randomizer.exe
          retention-days: 1
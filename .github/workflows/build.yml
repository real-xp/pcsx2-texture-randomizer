name: Build Binary And Upload To Artifact

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.x
          cache: "pip"

      - name: Installing dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build using PyInstaller
        run: |
          pyinstaller --name "PCSX2 Texture Randomizer" --clean --specpath "./build" --distpath "./dist" --workpath "./build" --onefile bin/main.py

      - name: Renaming binary for platform
        shell: bash
        run: |
          cd dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv "PCSX2 Texture Randomizer.exe" "PCSX2-Texture-Randomizer-windows.exe"
          else
            mv "PCSX2 Texture Randomizer" "PCSX2-Texture-Randomizer-linux"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: PCSX2-Texture-Randomizer-${{ matrix.os }}
          path: dist/PCSX2-Texture-Randomizer-*
          retention-days: 1
